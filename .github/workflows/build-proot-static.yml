name: Build PRoot v5.4.0 Static Binaries

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      proot_version:
        description: 'PRoot version to build (e.g., v5.4.0)'
        required: true
        default: 'v5.4.0'

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    name: Build PRoot Static (AArch64/ARM64)
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build PRoot v5.4.0 Static Binary (ARM64)
      run: |
        # Create a Dockerfile for building
        cat > Dockerfile.build << 'EOF'
        FROM alpine:3.19 AS builder
        
        # Install build dependencies
        # Note: lzo-static package doesn't exist in Alpine 3.19
        # Static libraries are included in lzo-dev
        RUN apk add --no-cache \
            build-base \
            bsd-compat-headers \
            clang \
            gcc \
            git \
            libarchive-dev \
            libarchive-static \
            linux-headers \
            lzo-dev \
            make \
            musl-dev \
            python3-dev \
            swig \
            talloc-dev \
            talloc-static \
            uthash-dev \
            zlib-static
        
        # Clone PRoot v5.4.0
        RUN git clone --depth 1 --branch v5.4.0 \
            https://github.com/proot-me/proot.git /usr/src/proot
        
        WORKDIR /usr/src/proot
        
        # Build static binary
        # Note: lzo static lib is in /usr/lib/liblzo2.a from lzo-dev
        RUN export LDFLAGS="-static -ltalloc -larchive -llzo2 -lz" && \
            make -C src clean && \
            make -C src loader.elf build.h && \
            make -C src proot
        
        # Verify static linking
        RUN file src/proot && \
            ldd src/proot 2>&1 || echo "Static binary verified"
        
        # Create output directory
        RUN mkdir -p /output && \
            cp src/proot /output/proot-static-aarch64 && \
            cp src/loader.elf /output/loader.elf 2>/dev/null || true
        
        FROM scratch AS export
        COPY --from=builder /output/proot-static-aarch64 /
        COPY --from=builder /output/loader.elf /
        EOF
        
        # Build using Docker Buildx with ARM64 platform
        docker buildx build \
          --platform linux/arm64 \
          --file Dockerfile.build \
          --target export \
          --output type=local,dest=./output \
          .

    - name: Verify Build
      run: |
        ls -la ./output/
        file ./output/proot-static-aarch64
        
        # Check if it's actually ARM64 binary
        if file ./output/proot-static-aarch64 | grep -q "aarch64"; then
          echo "✓ Binary is ARM64 architecture"
        else
          echo "✗ Binary architecture mismatch"
          exit 1
        fi
        
        # Check if statically linked
        if file ./output/proot-static-aarch64 | grep -q "statically linked"; then
          echo "✓ Binary is statically linked"
        else
          echo "⚠ Warning: May not be fully static"
        fi

    - name: Prepare Artifact
      run: |
        mkdir -p release
        cp ./output/proot-static-aarch64 release/
        [ -f ./output/loader.elf ] && cp ./output/loader.elf release/
        
        echo "PRoot v5.4.0 Static Binary (AArch64)" > release/README.txt
        echo "Build Date: $(date)" >> release/README.txt
        echo "Architecture: aarch64/arm64" >> release/README.txt
        echo "Source: https://github.com/proot-me/proot/releases/tag/v5.4.0" >> release/README.txt
        
        chmod +x release/proot-static-aarch64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: proot-static-aarch64
        path: |
          release/proot-static-aarch64
          release/loader.elf
          release/README.txt
        if-no-files-found: error

  build-armv7:
    runs-on: ubuntu-latest
    name: Build PRoot Static (ARMv7)
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build PRoot v5.4.0 Static Binary (ARMv7)
      run: |
        cat > Dockerfile.build << 'EOF'
        FROM alpine:3.19 AS builder
        
        RUN apk add --no-cache \
            build-base bsd-compat-headers clang gcc git \
            libarchive-dev libarchive-static linux-headers \
            lzo-dev make musl-dev python3-dev \
            swig talloc-dev talloc-static uthash-dev zlib-static
        
        RUN git clone --depth 1 --branch v5.4.0 \
            https://github.com/proot-me/proot.git /usr/src/proot
        
        WORKDIR /usr/src/proot
        
        RUN export LDFLAGS="-static -ltalloc -larchive -llzo2 -lz" && \
            make -C src clean && \
            make -C src loader.elf build.h && \
            make -C src proot
        
        RUN mkdir -p /output && cp src/proot /output/proot-static-armv7
        
        FROM scratch AS export
        COPY --from=builder /output/proot-static-armv7 /
        EOF
        
        docker buildx build \
          --platform linux/arm/v7 \
          --file Dockerfile.build \
          --target export \
          --output type=local,dest=./output \
          .

    - name: Prepare Artifact
      run: |
        mkdir -p release
        cp ./output/proot-static-armv7 release/
        chmod +x release/proot-static-armv7

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: proot-static-armv7
        path: release/proot-static-armv7
        if-no-files-found: error

  build-x86_64:
    runs-on: ubuntu-latest
    name: Build PRoot Static (x86_64)
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build PRoot v5.4.0 Static Binary (x86_64)
      run: |
        cat > Dockerfile.build << 'EOF'
        FROM alpine:3.19 AS builder
        
        RUN apk add --no-cache \
            build-base bsd-compat-headers clang gcc git \
            libarchive-dev libarchive-static linux-headers \
            lzo-dev make musl-dev python3-dev \
            swig talloc-dev talloc-static uthash-dev zlib-static
        
        RUN git clone --depth 1 --branch v5.4.0 \
            https://github.com/proot-me/proot.git /usr/src/proot
        
        WORKDIR /usr/src/proot
        
        RUN export LDFLAGS="-static -ltalloc -larchive -llzo2 -lz" && \
            make -C src clean && \
            make -C src loader.elf build.h && \
            make -C src proot
        
        RUN mkdir -p /output && cp src/proot /output/proot-static-x86_64
        
        FROM scratch AS export
        COPY --from=builder /output/proot-static-x86_64 /
        EOF
        
        docker buildx build \
          --platform linux/amd64 \
          --file Dockerfile.build \
          --target export \
          --output type=local,dest=./output \
          .

    - name: Prepare Artifact
      run: |
        mkdir -p release
        cp ./output/proot-static-x86_64 release/
        chmod +x release/proot-static-x86_64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: proot-static-x86_64
        path: release/proot-static-x86_64
        if-no-files-found: error

  release:
    needs: [build-aarch64, build-armv7, build-x86_64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: proot-static-*

    - name: Prepare Release Assets
      run: |
        mkdir -p release
        
        # Copy all artifacts
        cp artifacts/proot-static-aarch64/proot-static-aarch64 release/ 2>/dev/null || true
        cp artifacts/proot-static-aarch64/loader.elf release/ 2>/dev/null || true
        cp artifacts/proot-static-armv7/proot-static-armv7 release/ 2>/dev/null || true
        cp artifacts/proot-static-x86_64/proot-static-x86_64 release/ 2>/dev/null || true
        
        # Create archives
        cd release
        for f in proot-static-*; do
          if [ -f "$f" ]; then
            tar -czf "${f}.tar.gz" "$f"
            echo "Created ${f}.tar.gz"
          fi
        done

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*.tar.gz
        body: |
          PRoot v5.4.0 Static Binaries
          
          ### Architectures
          - **aarch64/arm64**: For modern Android devices, ARM64 servers
          - **armv7**: For older ARM 32-bit devices  
          - **x86_64**: For Intel/AMD 64-bit systems
          
          ### Usage
          ```bash
          ./proot-static-aarch64 -r /path/to/rootfs /bin/sh
          ```
          
          ### Build Details
          - Source: https://github.com/proot-me/proot/releases/tag/v5.4.0
          - Built on: Alpine Linux v3.19
          - Linked libraries: talloc (static), libarchive (static), lzo (static)
          
          ### Verification
          All binaries are fully static and should work on any Linux system without dependencies.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
